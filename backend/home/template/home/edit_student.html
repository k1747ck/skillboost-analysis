<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h2>Edit Student</h2>

<form method="POST">
{% csrf_token %}

<input class="form-control mb-3" type="text" name="name" value="{{ student.name }}">

<input class="form-control mb-3" type="email" name="email" value="{{ student.email }}">

<input class="form-control mb-3" type="text" name="course" value="{{ student.course }}">

<input class="form-control mb-3" type="number" step="0.01" name="score" value="{{ student.score }}">

<button class="btn btn-success">Update</button>

<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>

</div>

</body>
</html>
