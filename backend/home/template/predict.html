<!DOCTYPE html>
<html>

<head>

    <title>Student Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h2>Student Performance Prediction</h2>

            <form method="POST">

                {% csrf_token %}

                <input type="number" class="form-control mb-3" name="score" placeholder="Enter Student Score">

                <button class="btn btn-primary">Predict</button>

                <a href="/" class="btn btn-secondary">Back</a>

            </form>

            {% if prediction %}

            <div class="alert alert-success mt-4">

                Prediction Result: <b>{{ prediction }}</b>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
